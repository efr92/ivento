limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS — enables runtime hostname resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/v1/config {
        set $events_backend event_service:8000;
        proxy_pass http://$events_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/auth {
        limit_req zone=api burst=20 nodelay;
        set $auth_backend auth_service:8000;
        proxy_pass http://$auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/events {
        limit_req zone=api burst=50 nodelay;
        set $events_backend event_service:8000;
        proxy_pass http://$events_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/users {
        limit_req zone=api burst=20 nodelay;
        set $users_backend user_service:8000;
        proxy_pass http://$users_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        set $events_backend event_service:8000;
        proxy_pass http://$events_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
